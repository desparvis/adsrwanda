<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdsRwanda - Buy & Sell</title>
    <!-- Using a clean Inter or San Francisco-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
        }
        nav {
            border-bottom: 1px solid #e1e1e1;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-weight: 600; font-size: 1.2rem; text-decoration: none; color: #000; }
        .container { padding: 2rem 5%; }
        .btn-post {
            background: #000;
            color: #fff;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">ADSRWANDA</a>
        <a href="/post" class="btn-post">Post an Ad</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
